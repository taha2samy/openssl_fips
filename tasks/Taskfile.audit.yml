version: '3'


tasks:
  run:
    desc: "Executes the FIPS 140-3 functional verification suite against a specific container image. Generates granular Allure telemetry and a JSON forensic report."
    
    vars:
      IMG_SAFE: '{{.IMAGE | default .STANDERD_IMAGE}}'
      SAFE_NAME: '{{.IMG_SAFE | replace "/" "_" | replace ":" "_" | replace "." "_"}}'
    cmds:
      - mkdir -p {{.REPORT_DIR}}
      - mkdir -p {{.RESULTS_ROOT}}
      - pipenv run pytest tests/tests/ --alluredir="{{.RESULTS_ROOT}}/audit_{{.SAFE_NAME}}" --image="{{.IMG_SAFE}}" --json-report --json-report-file="{{.USER_WORKING_DIR}}/{{.REPORT_DIR}}/report_{{.REPORT_NAME}}.json" || true
      - echo "Image={{.IMG_SAFE}}" > "{{.RESULTS_ROOT}}/audit_{{.SAFE_NAME}}/environment.properties"
  multi:
    desc: "Executes the FIPS 140-3 functional verification suite against multiple container images (Standard and Distroless). Generates comprehensive Allure telemetry and JSON forensic reports for each variant."
    cmds:
      - task: run
        vars:
          IMAGE: "{{.STANDERD_IMAGE}}"
          REPORT_NAME: standard
      - task: run
        vars: 
          IMAGE: "{{.DISTROLESS_IMAGE}}"
          REPORT_NAME: distroless

  clean:
    desc: "Cleans up all generated test artifacts, including Allure results, JSON reports, and temporary directories. {{.RESULTS_REPORT}} {{.REPORT_DIR}} {{.RESULTS_ROOT}} "
    cmds:
      - rm -rf "{{.RESULTS_ROOT}}"
      - rm -rf "{{.REPORT_DIR}}"
      - rm -rf "{{.RESULTS_REPORT}}"
